{% extends "base.html" %}

{% block content %}

<h2>ISO 27001 Controls Library</h2>

<form method="GET" class="mb-3">

<input
type="text"
name="search"
placeholder="Search controls..."
class="form-control"
value="{{ search }}"
>

</form>

<div class="card p-4">

<div class="accordion">

{% for section, section_controls in controls.items() %}

<div class="accordion-item mb-2">

<button class="accordion-header btn btn-dark w-100 text-start">
{{ section }}
</button>

<div class="accordion-content" style="display:none; padding:10px;">

<ul class="list-group">

{% for control in section_controls %}

<li class="list-group-item">
{{ control }}
</li>

{% endfor %}

</ul>

</div>

</div>

{% endfor %}

</div>

</div>

<script>

document.querySelectorAll(".accordion-header").forEach(btn => {

btn.addEventListener("click", () => {

const content = btn.nextElementSibling;

content.style.display =
content.style.display === "block" ? "none" : "block";

});

});

</script>
{% endblock %}
