{% extends 'base.html' %}
{% block content %}

<h2>Risk Heatmap Matrix</h2>

<div class="heatmap-5x5">

{% for i in range(1,26) %}
<div class="heatmap-cell {% if i > 20 %}critical{% elif i > 15 %}high{% elif i > 8 %}medium{% else %}low{% endif %}">
{{ i }}
</div>
{% endfor %}

</div>

{% endblock %}
