{% extends 'base.html' %}

{% block content %}

<h2>Report History</h2>

<table class="table">

<thead>
<tr>
<th>User</th>
<th>Report</th>
<th>Generated At</th>
</tr>
</thead>

<tbody>

{% for log in logs %}

<tr>
<td>{{ log.user }}</td>
<td>{{ log.report_type }}</td>
<td>{{ log.timestamp }}</td>
</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
