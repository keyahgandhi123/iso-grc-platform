{% extends "base.html" %}

{% block content %}

<h2>Statement of Applicability</h2>

<form method="POST">

{% for section, controls in controls.items() %}

<h3>{{ section }}</h3>

{% for control in controls %}

<label>

<input type="checkbox" name="{{ control }}"
{% if status.get(control) %}checked{% endif %}
>

{{ control }}

</label>

<br>

{% endfor %}

<br>

{% endfor %}

<button type="submit">Save</button>

</form>

{% endblock %}
