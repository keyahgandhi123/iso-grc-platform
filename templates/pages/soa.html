{% extends "base.html" %}

{% block content %}

<h2>Statement of Applicability</h2>

<form method="POST">

<div class="card p-4">

<ul class="list-group">

{% for control in controls %}

<li class="list-group-item">

<input
type="checkbox"
name="{{ control }}"
{% if status.get(control) %} checked {% endif %}
>

{{ control }}

</li>

{% endfor %}

</ul>

<button class="btn btn-primary mt-3">
Save SoA
</button>

</div>

</form>

{% endblock %}
